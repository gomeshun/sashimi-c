name: itamae-migration

on:
  push:
    branches: [itamae-migration]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned public ITAMAE
        uses: actions/checkout@v4
        with:
          repository: gomeshun/itamae
          ref: 863cb0643c61ca4ea7458d7a221f48e5c5bfe515
          path: .itamae
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv venv
      - name: Install migration dependencies
        run: uv pip install ./.itamae pytest
      - name: Run ITAMAE migration regression tests
        run: uv run python -m pytest -q --junitxml=test-results.xml tests/test_itamae_migration.py tests/test_itamae_variance.py
      - name: Upload migration test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-test-results
          path: test-results.xml
