name: itamae-migration

on:
  push:
    branches: [itamae-migration]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  regression:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned public ITAMAE
        uses: actions/checkout@v4
        with:
          repository: gomeshun/itamae
          ref: d5237e74f24e98dcf2453e67862e75f3ae42e83d
          path: .itamae
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv venv --python ${{ matrix.python-version }}
      - name: Install migration dependencies
        run: uv pip install ./.itamae ".[test]"
      - name: Run ITAMAE migration regression tests
        run: uv run python -m pytest -q --junitxml=test-results.xml
      - name: Upload migration test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-test-results-${{ matrix.python-version }}
          path: test-results.xml

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned public ITAMAE
        uses: actions/checkout@v4
        with:
          repository: gomeshun/itamae
          ref: d5237e74f24e98dcf2453e67862e75f3ae42e83d
          path: .itamae
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Build wheel and source distribution
        run: uv build
      - name: Install wheel in a clean environment
        run: |
          uv venv --python 3.11 .venv-smoke
          uv pip install --python .venv-smoke/bin/python ./.itamae
          uv pip install --python .venv-smoke/bin/python --no-deps dist/*.whl
      - name: Smoke-test legacy and opt-in imports
        run: |
          .venv-smoke/bin/python -c "import sashimi_c; assert sashimi_c.subhalo_properties"
          .venv-smoke/bin/python -c "import sashimi_c_itamae; assert sashimi_c_itamae.subhalo_properties"
