name: itamae-migration

on:
  push:
    branches: [itamae-migration]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv venv
      - name: Install migration dependencies
        run: uv pip install numpy scipy pytest
      - name: Assemble pinned ITAMAE CI package
        run: |
          mkdir -p .ci/runtime/itamae/{cosmology,evolution,halo,numerics,types}
          touch .ci/runtime/itamae/__init__.py
          cp .ci/itamae_native_snapshot.py .ci/runtime/itamae/_snapshot.py
          printf 'from itamae._snapshot import NativeFlatLCDM\n\n__all__ = ["NativeFlatLCDM"]\n' > .ci/runtime/itamae/cosmology/__init__.py
          printf 'from itamae._snapshot import shanks_transform\n\n__all__ = ["shanks_transform"]\n' > .ci/runtime/itamae/evolution/__init__.py
          printf 'from itamae._snapshot import invert_nfw_mass_function, nfw_mass_function\n\n__all__ = ["invert_nfw_mass_function", "nfw_mass_function"]\n' > .ci/runtime/itamae/halo/__init__.py
          printf 'from itamae._snapshot import gauss_hermite_lognormal\n\n__all__ = ["gauss_hermite_lognormal"]\n' > .ci/runtime/itamae/numerics/__init__.py
          printf 'from itamae._snapshot import WeightedSubhaloCatalog\n\n__all__ = ["WeightedSubhaloCatalog"]\n' > .ci/runtime/itamae/types/__init__.py
      - name: Run ITAMAE migration regression tests
        env:
          PYTHONPATH: ${{ github.workspace }}/.ci/runtime:${{ github.workspace }}
        run: uv run pytest -q tests/test_itamae_migration.py
